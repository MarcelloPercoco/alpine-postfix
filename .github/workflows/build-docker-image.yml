name: Build-Action  # When pushing to any branch then run this action
# Env variable
env:
  DESCRIPTION: "Simple postfix image based on alpine linux"

on:
  workflow_dispatch:
  push:
    branches:
    - 'main'
  schedule:
    - cron: "0 0 * * 0"

jobs: # job name
  build-deploy:
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest  # runner name : (ubuntu latest version)
    steps:
      - name: Check out my repo
        uses: actions/checkout@v5
      - name: lowercase repository
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - name: take postfix version
        run: |
          echo "POSTFIX_VERSION=$(docker run --rm docker.io/alpine:${{ vars.ALPINE_VERSION }} /bin/sh -c 'apk update -q && apk add postfix -q && apk info postfix | head -n 1' | sed -e 's/[^-]*-\(.*\) [^ ]*/\1/' )" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: dockerhub login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: ghcr login
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the Docker image # push The image to the docker hub
        uses: docker/build-push-action@v6
        with:
          tags: |
            ${{ vars.REPO_NAME }}:${{ env.POSTFIX_VERSION }}
            ${{ vars.REPO_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ env.POSTFIX_VERSION }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          labels:
            MAINTAINER="Marcello Percoco <114474556+MarcelloPercoco@users.noreply.github.com>"
            org.opencontainers.image.source=https://github.com/MarcelloPercoco/alpine-postfix
            org.opencontainers.image.description=${{env. DESCRIPTION }}
          build-args: |
            ALPINE_VERSION=${{ vars.ALPINE_VERSION }}
          platforms: |
            linux/arm/v7
            linux/arm64
            linux/amd64
          push: true
          sbom: true
          provenance: mode=max
          annotations: org.opencontainers.image.description=${{ env.DESCRIPTION }}

  cleanup:
    needs: build-deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
  
    steps:
      - name: Get last 3 tags from GHCR
        id: tags
        run: |
          IMAGE="${GITHUB_REPOSITORY@L}"
          TAGS=$(gh api \
            /users/${GITHUB_REPOSITORY_OWNER}/packages/container/${GITHUB_REPOSITORY#*/}/versions \
            --jq '.[].metadata.container.tags[]' | sort -u)
          
          # prendi gli ultimi 3 tag in ordine temporale
          LAST3=$(gh api \
            /users/${GITHUB_REPOSITORY_OWNER}/packages/container/${GITHUB_REPOSITORY#*/}/versions \
            --jq '[.[].metadata.container.tags[0]] | unique | .[:3] | join(",")')
  
          echo "KEEP_TAGS=$LAST3" >> $GITHUB_ENV
  
      - name: Cleanup GHCR (only untagged + keep last 3 real tags)
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          dry-run: false
          delete-untagged: true
          keep-tags: ${{ env.KEEP_TAGS }}
  
