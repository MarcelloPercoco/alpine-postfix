name: GHCR Cleanup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"   # domenica alle 03:00

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: lowercase repository
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up ONLY untagged GHCR images
        uses: Chizkiyahu/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          delete-untagged: true
          dry-run: false
