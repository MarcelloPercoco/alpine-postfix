name: Build-Action  # When pushing to any branch then run this action
# Env variable
env:
  ALPINE_VERSION: ${{ vars.ALPINE_VERSION }}

on:
  workflow_dispatch:
  push:
    branches:
    - '*'

jobs: # job name
  build-deploy:
    runs-on: ubuntu-latest  # runner name : (ubuntu latest version)
    steps:
      - uses: actions/checkout@v4 # first action : checkout source code
      - name: lowercase repository
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - name: take postfix version
        run: |
          echo "POSTFIX_VERSION=$(docker run --rm docker.io/alpine:${ALPINE_VERSION} /bin/sh -c 'apk update -q && apk add postfix -q && apk info postfix | head -n 1' | sed -e 's/[^-]*-\(.*\) [^ ]*/\1/' )" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: 'lunux/amd64,linux/arm64,linux/arm/v7'
      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: docker login
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the Docker image # push The image to the docker hub
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: |
            ${{ vars.REPO_NAME }}:${{ env.POSTFIX_VERSION }}
            ${{ vars.REPO_NAME }}:latest
          #tags: ${{ vars.REPO_NAME }}:${{ env.POSTFIX_VERSION }},${{ vars.REPO_NAME }}:latest,ghcr.io/${{ env.IMAGE_NAME }}:${{ env.POSTFIX_VERSION }},ghcr.io/${{ env.IMAGE_NAME }}:latest
          build-args: ALPINE_VERSION=${{ vars.ALPINE_VERSION }}
          platforms: |
            linux/arm/v7
            linux/arm64
            linux/amd64
          push: true
          outputs: |
            type=image
            name=target
            annotation-index.org.opencontainers.image.description=${{ vars.DESCRIPTION }}
            provenance=mode=max
            sbom=true